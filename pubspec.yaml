name: recipe_app
description: A recipe application with multimedia, AI chatbot, and image editing.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ───────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # ── Image ──────────────────────────────────────────────────
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  image: ^4.2.0
  path_provider: ^2.1.4

  # ── Multimedia ─────────────────────────────────────────────
  video_player: ^2.9.1
  chewie: ^1.8.5
  just_audio: ^0.9.40
  file_picker: ^8.1.2

  # ── Networking ─────────────────────────────────────────────
  http: ^1.2.2

  # ── Speech ─────────────────────────────────────────────────
  speech_to_text: ^6.6.2

  # ── UI ─────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/